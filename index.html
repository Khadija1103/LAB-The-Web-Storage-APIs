<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Pokémon Favoritos</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS externo -->
    <link rel="stylesheet" href="./assets/css/index.css" />
    <script src="./js/app.js" type="module"></script>
  </head>

  <body>
    <header>
        <nav>
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="">Acerca de Nosotros</a></li>
      
      <li><a href="">Contacto</a></li>
    </ul>
  </nav>
    </header>
    <div class="container mt-4">
      <h1>🔎 Buscador de Pokémon</h1>

      <div class="input-group w-50 mx-auto mt-3">
        <input
          type="text"
          id="pokemonInput"
          class="form-control"
          placeholder="Nombre del Pokémon"
        />
        <button id="search-pokemon" class="btn btn-primary">Buscar</button>
      </div>

      <div id="resultado"></div>

      <button id="save-favorite" class="btn btn-success mt-3">
        ⭐ Guardar como Favorito
      </button>

      <h2 class="mt-4">Mis Favoritos</h2>
      <div id="favoritos"></div>
    </div>

    <footer
      style="
        background: linear-gradient(to bottom, #ef5350 50%, #ffffff 50%);
        border-top: 10px solid #333333;
        border-bottom: 10px solid #333333;
        padding: 30px 10px;
        margin-top: 60px;
        font-family: &quot;Segoe UI&quot;, Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        position: relative;
        box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.1);
      "
    >
      <div
        style="
          width: 50px;
          height: 50px;
          background-color: white;
          border: 10px solid #333333;
          border-radius: 50%;
          position: absolute;
          top: -30px;
          left: 50%;
          transform: translateX(-50%);
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
          z-index: 10;
        "
      >
        <div
          style="
            width: 20px;
            height: 20px;
            background-color: white;
            border: 5px solid #333333;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
          "
        ></div>
      </div>

      <div style="position: relative; z-index: 5; margin-top: 10px">
        <p
          style="
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: bold;
            color: #333333;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
          "
        >
          © 2026 - Pokémon Favoritos :: Laboratorio Web Storage
        </p>

        <p
          style="
            margin: 0;
            font-size: 14px;
            color: #333333;
            line-height: 1.6;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid #ddd;
          "
        >
          <strong>Maestros Desarrolladores:</strong><br />
          Jesús Manuel Porras, Tatiana Marrugo, Rigoberto Miranda,<br />
          Jonathan Arévalo y Valeria Gutiérrez
        </p>
      </div>
    </footer>
  </body>
</html>
