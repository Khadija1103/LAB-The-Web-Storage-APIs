<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokémon Favoritos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS externo -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div data-pokemon-header></div>

    <div class="container mt-4">

        <h1>🔎 Buscador de Pokémon</h1>

        <div class="input-group w-50 mx-auto mt-3">
            <input type="text" id="pokemonInput" class="form-control" placeholder="Nombre del Pokémon">
            <button class="btn btn-primary" onclick="searchPokemon()">Buscar</button>
        </div>

        <div id="resultado"></div>

        <button class="btn btn-success mt-3" onclick="saveFavorite()">
            ⭐ Guardar como Favorito
        </button>

        <h2 class="mt-4">Mis Favoritos</h2>
        <div id="favoritos"></div>

    </div>

    <script>
        let pokemonActual = null;

        async function searchPokemon() {
            const nombre = document.getElementById("pokemonInput").value.toLowerCase().trim();

            if (!nombre) {
                alert("Ingrese un nombre");
                return;
            }

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${nombre}`);

                if (!response.ok) throw new Error();

                const data = await response.json();

                pokemonActual = {
                    name: data.name,
                    image: data.sprites.front_default
                };

                document.getElementById("resultado").innerHTML = `
                    <h3>${pokemonActual.name}</h3>
                    <img src="${pokemonActual.image}">
                `;

            } catch {
                alert("Pokémon no encontrado");
            }
        }

        function saveFavorite() {

            if (!pokemonActual) {
                alert("Primero busca un Pokémon");
                return;
            }

            let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

            const existe = favoritos.some(p => p.name === pokemonActual.name);

            if (!existe) {
                favoritos.push(pokemonActual);
                localStorage.setItem("favoritos", JSON.stringify(favoritos));
                updateFavoritesList();
            } else {
                alert("Ya está en favoritos");
            }
        }

        function updateFavoritesList() {

            const favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];
            const contenedor = document.getElementById("favoritos");

            contenedor.innerHTML = "";

            favoritos.forEach(pokemon => {

                const div = document.createElement("div");
                div.classList.add("favorito");

                div.innerHTML = `
                    <h5>${pokemon.name}</h5>
                    <img src="${pokemon.image}">
                `;

                contenedor.appendChild(div);
            });
        }

        window.onload = updateFavoritesList;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components/header-component.js"></script>

</body>
</html>
